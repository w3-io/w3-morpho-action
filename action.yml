name: 'W3 Morpho Action'
description: 'Morpho Blue lending and MetaMorpho vaults — supply, borrow, liquidate, flash loans, and ERC-4626 vault operations.'
author: 'w3-io'

inputs:
  command:
    description: >
      Operation to perform. Blue reads: get-market, get-market-params,
      get-position, list-markets, get-allowance. Vault reads: vault-info,
      vault-balance, list-vaults. Blue writes: supply, withdraw,
      supply-collateral, withdraw-collateral, borrow, repay, liquidate,
      accrue-interest, create-market, set-authorization. Vault writes:
      vault-deposit, vault-withdraw, vault-redeem. Helpers: approve,
      wrap-eth, unwrap-eth.
    required: true
  network:
    description: 'Blockchain network (ethereum, base, arbitrum, polygon, optimism)'
    required: true
  rpc-url:
    description: 'Custom RPC endpoint URL (recommended for reliability)'
    required: false

  # Blue market identification
  market-id:
    description: 'Morpho Blue market ID (bytes32 hash)'
    required: false

  # Blue market params (for write operations)
  loan-token:
    description: 'Loan token address'
    required: false
  collateral-token:
    description: 'Collateral token address'
    required: false
  oracle:
    description: 'Oracle contract address'
    required: false
  irm:
    description: 'Interest rate model address'
    required: false
  lltv:
    description: 'Liquidation LTV in wei (e.g. 860000000000000000 = 86%)'
    required: false

  # Token for approve command
  asset:
    description: 'ERC-20 token address (for approve command)'
    required: false
  spender:
    description: 'Spender address for approve (defaults to Morpho Blue)'
    required: false

  # Amounts and addresses
  amount:
    description: 'Token amount in base units'
    required: false
  user:
    description: 'User address for position queries'
    required: false
  on-behalf-of:
    description: 'Address to operate on behalf of (defaults to signer)'
    required: false
  receiver:
    description: 'Receiver address for withdrawals'
    required: false

  # Vault inputs
  vault-address:
    description: 'MetaMorpho vault contract address'
    required: false
  owner:
    description: 'Share owner for vault withdrawals'
    required: false

  # Liquidation
  borrower:
    description: 'Borrower address for liquidation'
    required: false
  seized-assets:
    description: 'Amount of collateral to seize in liquidation'
    required: false

  # Authorization
  authorized:
    description: 'Address to authorize for set-authorization'
    required: false
  is-authorized:
    description: 'true to authorize, false to revoke'
    required: false
    default: 'true'

  # Vault redeem
  shares:
    description: 'Vault shares for redeem command'
    required: false

  # List controls
  limit:
    description: 'Number of results for list commands (default 20)'
    required: false
    default: '20'

outputs:
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node24'
  main: 'dist/index.js'
