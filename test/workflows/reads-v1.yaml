name: Morpho Reads v1
on:
  workflow_dispatch: {}

jobs:
  reads:
    runs-on: ubuntu-latest
    steps:
      # Get market state for USDC/PAXG market on Ethereum mainnet
      - uses: w3-io/w3-morpho-action@main
        id: market
        with:
          command: get-market
          market-id: '0x8eaf7b29f02ba8d8c1d7aeb587403dcb16e2e943e4e2f5f94b0963c2386406c9'
          network: ethereum
          rpc-url: https://eth-mainnet.g.alchemy.com/v2/0L3k1EjL5mpti6pqRUi1y

      # Get the market params for the same market
      - uses: w3-io/w3-morpho-action@main
        id: params
        with:
          command: get-market-params
          market-id: '0x8eaf7b29f02ba8d8c1d7aeb587403dcb16e2e943e4e2f5f94b0963c2386406c9'
          network: ethereum
          rpc-url: https://eth-mainnet.g.alchemy.com/v2/0L3k1EjL5mpti6pqRUi1y

      - run: |
          echo "=== Market State ==="
          echo "${{ steps.market.outputs.result }}"
          echo "=== Market Params ==="
          echo "${{ steps.params.outputs.result }}"
